name: Build & Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "webdev/backend/**"
      - ".github/workflows/ec2-docker.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/smileyniloc

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write

# ──────────────────────────────────────────────────────────────
# 1. Detect which services changed
# ──────────────────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      exporter: ${{ steps.filter.outputs.exporter }}
      ingestor: ${{ steps.filter.outputs.ingestor }}
      processor: ${{ steps.filter.outputs.processor }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            exporter:
              - 'webdev/backend/exporter/**'
            ingestor:
              - 'webdev/backend/ingestor/**'
            processor:
              - 'webdev/backend/processor/**'
            compose:
              - 'webdev/backend/docker-compose.yml'

  # ──────────────────────────────────────────────────────────────
  # 2. Build & push changed images (one job per service)
  # ──────────────────────────────────────────────────────────────
  build_exporter:
    needs: changes
    if: needs.changes.outputs.exporter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push exporter image
        uses: docker/build-push-action@v6
        with:
          context: ./webdev/backend/exporter
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/cradlewave-exporter:main
            ${{ env.IMAGE_PREFIX }}/cradlewave-exporter:${{ github.sha }}
          cache-from: type=gha,scope=exporter
          cache-to: type=gha,scope=exporter,mode=max

  build_processor:
    needs: changes
    if: needs.changes.outputs.processor == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push processor image
        uses: docker/build-push-action@v6
        with:
          context: ./webdev/backend/processor
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/cradlewave-processor:main
            ${{ env.IMAGE_PREFIX }}/cradlewave-processor:${{ github.sha }}
          cache-from: type=gha,scope=processor
          cache-to: type=gha,scope=processor,mode=max

  build_ingestor:
    needs: changes
    if: needs.changes.outputs.ingestor == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ingestor image
        uses: docker/build-push-action@v6
        with:
          context: ./webdev/backend/ingestor
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/cradlewave-ingestor:main
            ${{ env.IMAGE_PREFIX }}/cradlewave-ingestor:${{ github.sha }}
          cache-from: type=gha,scope=ingestor
          cache-to: type=gha,scope=ingestor,mode=max

  # ──────────────────────────────────────────────────────────────
  # 3. Deploy to Oracle VM (runs after all builds)
  # Uses SSH to copy docker-compose.yml and trigger a pull + restart on the VM
  # ──────────────────────────────────────────────────────────────
  deploy:
    needs: [changes, build_exporter, build_processor, build_ingestor]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/cradlewave.pem
          chmod 600 ~/.ssh/cradlewave.pem

      - name: Deploy to Oracle VM
        env:
          VM_IP: ${{ secrets.ORACLE_VM_IP }}
        run: |
          # Create target directory
          ssh -i ~/.ssh/cradlewave.pem -o StrictHostKeyChecking=no ubuntu@$VM_IP "mkdir -p ~/webdev/backend"

          # Copy docker-compose.yml to the CORRECT folder
          scp -i ~/.ssh/cradlewave.pem -o StrictHostKeyChecking=no webdev/backend/docker-compose.yml ubuntu@$VM_IP:~/webdev/backend/docker-compose.yml

          # Authenticate, Pull, and Run
          ssh -i ~/.ssh/cradlewave.pem -o StrictHostKeyChecking=no ubuntu@$VM_IP << EOF
            set -e
            
            # Authenticate VM with GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd ~/webdev/backend
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f
          EOF
