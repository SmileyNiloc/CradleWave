name: Build & Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "webdev/backend/**"
      - ".github/workflows/ec2-docker.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/smileyniloc

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write

# ──────────────────────────────────────────────────────────────
# 1. Detect which services changed
# ──────────────────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      exporter: ${{ steps.filter.outputs.exporter }}
      ingestor: ${{ steps.filter.outputs.ingestor }}
      processor: ${{ steps.filter.outputs.processor }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            exporter:
              - 'webdev/backend/exporter/**'
            ingestor:
              - 'webdev/backend/ingestor/**'
            processor:
              - 'webdev/backend/processor/**'
            compose:
              - 'webdev/backend/docker-compose.yml'

  # ──────────────────────────────────────────────────────────────
  # 2. Build & push changed images (one job per service)
  # ──────────────────────────────────────────────────────────────
  build_exporter:
    needs: changes
    if: needs.changes.outputs.exporter == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push exporter image
        uses: docker/build-push-action@v6
        with:
          context: ./webdev/backend/exporter
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/cradlewave-exporter:main
            ${{ env.IMAGE_PREFIX }}/cradlewave-exporter:${{ github.sha }}
          cache-from: type=gha,scope=exporter
          cache-to: type=gha,scope=exporter,mode=max

  build_processor:
    needs: changes
    if: needs.changes.outputs.processor == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push processor image
        uses: docker/build-push-action@v6
        with:
          context: ./webdev/backend/processor
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/cradlewave-processor:main
            ${{ env.IMAGE_PREFIX }}/cradlewave-processor:${{ github.sha }}
          cache-from: type=gha,scope=processor
          cache-to: type=gha,scope=processor,mode=max

  build_ingestor:
    needs: changes
    if: needs.changes.outputs.ingestor == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ingestor image
        uses: docker/build-push-action@v6
        with:
          context: ./webdev/backend/ingestor
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/cradlewave-ingestor:main
            ${{ env.IMAGE_PREFIX }}/cradlewave-ingestor:${{ github.sha }}
          cache-from: type=gha,scope=ingestor
          cache-to: type=gha,scope=ingestor,mode=max

  # ──────────────────────────────────────────────────────────────
  # 3. Deploy to EC2 (runs after all builds, even if some skipped)
  # ──────────────────────────────────────────────────────────────
  deploy:
    needs: [changes, build_exporter, build_processor, build_ingestor]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
          role-session-name: github-actions-ec2

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/cradlewave.pem
          chmod 600 ~/.ssh/cradlewave.pem
          cat <<EOF > ~/.ssh/config
          Host cradlewave-ec2
              HostName i-00476f32b32bce525
              User ubuntu
              IdentityFile ~/.ssh/cradlewave.pem
              ProxyCommand aws ec2-instance-connect open-tunnel --instance-id %h --region us-east-2
              StrictHostKeyChecking no
          EOF

      - name: Deploy to EC2
        run: |
          ssh cradlewave-ec2 "mkdir -p ~/webdev/backend"
          scp webdev/backend/docker-compose.yml cradlewave-ec2:~/webdev/backend/docker-compose.yml

          ssh cradlewave-ec2 << 'EOF'
            set -e
            cd ~/webdev/backend
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          EOF
