services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    network_mode: host
  cradlewave-backend:
    image: ghcr.io/smileyniloc/cradlewave-backend:main
    container_name: cradlewave-backend
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 5256M
    depends_on:
      - redis
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
