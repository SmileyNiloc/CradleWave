services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      [
        "/usr/local/bin/redis-server",
        "--maxmemory",
        "150mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    deploy:
      resources:
        limits:
          memory: 5256M
  cradlewave-backend:
    image: ghcr.io/smileyniloc/cradlewave-backend:main
    container_name: cradlewave-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - redis
